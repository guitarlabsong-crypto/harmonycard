<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Memory Card</title>
    <style>
        :root {
            --primary: #5d5fef;
            --danger: #ff4757;
            --success: #2ed573;
            --dark: #1e272e;
            --gold: #ffa502;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, sans-serif;
            background: #fdfdfd;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            color: var(--dark);
        }

        /* 제목 스타일 */
        .header-title { text-align: center; margin-top: 10px; line-height: 1.2; }
        .header-title h1 { font-size: 1.1rem; color: #555; margin: 0; font-weight: 400; }
        .header-title h2 { font-size: 1.8rem; color: var(--primary); margin: 0; font-weight: 800; }

        .status-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px 15px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; font-weight: bold; display: block; }

        /* 프로그레스 바 */
        .timer-bar {
            width: 100%;
            max-width: 340px;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        #progress { width: 100%; height: 100%; background: var(--primary); transition: width 1s linear; }

        /* 📱 그리드 설정: 4열 배치 & 카드 크기 축소 */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 340px; /* 아이폰 화면에 여유있게 들어가는 크기 */
        }

        .card {
            aspect-ratio: 3 / 4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem; /* 글자 크기 살짝 조정 */
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card-front { background: var(--dark); color: var(--gold); border: 1px solid #333; }
        .card-back {
            background: white;
            color: var(--primary);
            transform: rotateY(180deg);
            border: 2px solid var(--primary);
        }

        .matched .card-back { background: var(--success); color: white; border-color: var(--success); }
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-4px); }
            75% { transform: rotateY(180deg) translateX(4px); }
        }

        /* 오버레이 */
        #message-overlay {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            width: 80%;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1000;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header-title">
        <h1>SONG,YOUNG MIN Guitar Lab</h1>
        <h2>Memory Card</h2>
    </div>

    <div class="status-container">
        <div class="stat-item">
            <span class="stat-label">Score</span>
            <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Lives</span>
            <span id="lives" class="stat-value" style="color: var(--danger)">3</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Status</span>
            <span id="status" class="stat-value" style="font-size: 0.9rem;">Ready</span>
        </div>
    </div>

    <div class="timer-bar">
        <div id="progress"></div>
    </div>

    <div id="game-board" class="grid"></div>

    <div id="message-overlay">
        <h2 id="msg-title">GAME OVER</h2>
        <p id="msg-score-text">최종 점수: 0점</p>
        <button onclick="initGame()">다시 시작하기</button>
    </div>

    <script>
        const symbols = ['C', 'D', 'E', 'F', 'G', 'A', 'B', '🎼']; // clef 추가
        let flippedCards = [];
        let lives = 3;
        let score = 0;
        let canClick = false;
        let matchedCount = 0;

        const board = document.getElementById('game-board');
        const livesDisplay = document.getElementById('lives');
        const scoreDisplay = document.getElementById('score');
        const statusDisplay = document.getElementById('status');
        const progressBar = document.getElementById('progress');
        const overlay = document.getElementById('message-overlay');

        function initGame() {
            board.innerHTML = '';
            overlay.style.display = 'none';
            lives = 3;
            score = 0;
            matchedCount = 0;
            livesDisplay.innerText = lives;
            scoreDisplay.innerText = score;
            canClick = false;
            flippedCards = [];
            
            // 8쌍(16장) 생성
            const deck = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
            
            deck.forEach(symbol => {
                const card = document.createElement('div');
                card.className = 'card flipped';
                card.innerHTML = `
                    <div class="card-face card-front">?</div>
                    <div class="card-face card-back">${symbol}</div>
                `;
                card.dataset.symbol = symbol;
                card.addEventListener('click', () => handleCardClick(card));
                board.appendChild(card);
            });

            startCountdown();
        }

        function startCountdown() {
            let sec = 5;
            statusDisplay.innerText = "Memorize!";
            progressBar.style.transition = 'none';
            progressBar.style.width = '100%';
            
            setTimeout(() => {
                progressBar.style.transition = 'width 5s linear';
                progressBar.style.width = '0%';
            }, 10);

            const timer = setInterval(() => {
                sec--;
                if (sec <= 0) {
                    clearInterval(timer);
                    statusDisplay.innerText = "Start!";
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
                    canClick = true;
                }
            }, 1000);
        }

        function handleCardClick(card) {
            if (!canClick || card.classList.contains('flipped') || flippedCards.length >= 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            
            if (c1.dataset.symbol === c2.dataset.symbol) {
                c1.classList.add('matched');
                c2.classList.add('matched');
                score += 100;
                scoreDisplay.innerText = score;
                matchedCount += 2;
                flippedCards = [];
                if (matchedCount === 16) endGame(true);
            } else {
                canClick = false;
                setTimeout(() => {
                    c1.classList.add('shake');
                    c2.classList.add('shake');
                    
                    setTimeout(() => {
                        c1.classList.remove('flipped', 'shake');
                        c2.classList.remove('flipped', 'shake');
                        flippedCards = [];
                        lives--;
                        livesDisplay.innerText = lives;
                        canClick = true;
                        if (lives <= 0) endGame(false);
                    }, 500);
                }, 300);
            }
        }

        function endGame(isWin) {
            canClick = false;
            overlay.style.display = 'block';
            document.getElementById('msg-title').innerText = isWin ? "Great Job! 🎉" : "Try Again! 👻";
            document.getElementById('msg-score-text').innerText = `최종 점수: ${score}점`;
        }

        initGame();
    </script>
</body>
</html>
