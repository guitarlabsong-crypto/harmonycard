<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYM Guitar Lab Singing Test</title>
    <style>
        /* 게임 화면 배경 및 전체 톤: 갈색 계열 */
        body { 
            text-align: center; 
            font-family: 'Pretendard', sans-serif; 
            background: #3e2723; /* 짙은 갈색 배경 */
            color: #efebe9; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container { 
            background: #5d4037; /* 밝은 갈색 카드 */
            width: 90%; 
            max-width: 450px; 
            padding: 40px 20px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            border: 2px solid #8d6e63;
        }
        h1 { font-size: 1.4rem; color: #d7ccc8; margin-bottom: 5px; letter-spacing: 1px; }
        h2 { font-size: 1.8rem; color: #ffffff; margin-top: 0; margin-bottom: 30px; }
        
        #level-info { font-size: 1.1rem; color: #bcaaa4; margin-bottom: 10px; }
        #target-notes { 
            font-size: 3rem; 
            font-weight: bold; 
            margin: 25px 0; 
            color: #ffccbc; /* 살구색 포인트 */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            min-height: 70px; 
        }
        #user-note { font-size: 1.3rem; color: #ffab91; height: 30px; margin-bottom: 20px; }
        
        /* 버튼 디자인 */
        button { 
            background: #8d6e63; 
            color: white; 
            border: none; 
            padding: 18px 40px; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        button:hover { background: #a1887f; }
        button:active { transform: scale(0.95); }

        .status-msg { margin-top: 25px; font-size: 1.1rem; color: #d7ccc8; }
    </style>
</head>
<body>

<div class="container" id="game-ui">
    <h1>SONG,YOUNG-MIN Guitar Lab</h1>
    <h2>Singing Test</h2>
    
    <div id="game-content" style="display: none;">
        <div id="level-info">Level 1</div>
        <div id="target-notes">준비!</div>
        <div id="user-note">내 목소리: -</div>
        <div class="status-msg" id="status">문제를 들려드릴게요.</div>
    </div>

    <button id="start-btn" onclick="initGame()">START GAME</button>
</div>

<script>
/* -----------------------------------------------------------
   1. 다이아토닉 스케일 설정 (C Major: 도레미파솔라시)
----------------------------------------------------------- */
// 샵(#)이나 플랫(b)을 제외한 7음만 사용합니다.
const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
const KOR_NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88]; // C4~B4

let currentLevel = 1;      
let targetSequence = [];   
let userProgress = 0;      
let isListening = false;   
let audioCtx, analyser, microphone;

/* -----------------------------------------------------------
   2. 게임 시작 함수
----------------------------------------------------------- */
async function initGame() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // 인트로 버튼 숨기고 게임 화면 표시
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('game-content').style.display = 'block';
    
    startNewLevel();
}

function startNewLevel() {
    userProgress = 0;
    targetSequence = [];
    document.getElementById('level-info').innerText = `Level ${currentLevel}`;
    document.getElementById('status').innerText = "문제를 듣고 기억하세요!";
    
    // 현재 레벨 숫자만큼 다이아토닉 음계에서 랜덤 추출
    for(let i=0; i < currentLevel; i++) {
        let randomIndex = Math.floor(Math.random() * NOTES.length);
        targetSequence.push(randomIndex);
    }

    playSequence(); 
}

/* -----------------------------------------------------------
   3. 소리 재생 (문제 들려주기)
----------------------------------------------------------- */
async function playSequence() {
    isListening = false;
    document.getElementById('target-notes').innerText = "...";
    
    for (let i = 0; i < targetSequence.length; i++) {
        let noteIdx = targetSequence[i];
        // 재생 중에는 하나씩만 크게 보여줌
        document.getElementById('target-notes').innerText = KOR_NOTES[noteIdx];
        
        await playTone(FREQS[noteIdx], 0.7); 
        await new Promise(r => setTimeout(r, 250)); 
    }
    
    document.getElementById('target-notes').innerText = "?";
    document.getElementById('status').innerText = "이제 똑같이 불러보세요!";
    startListening();
}

function playTone(freq, duration) {
    return new Promise(resolve => {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'triangle'; // 조금 더 부드러운 소리
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
        setTimeout(resolve, duration * 1000);
    });
}

/* -----------------------------------------------------------
   4. 음성 분석 및 판정
----------------------------------------------------------- */
async function startListening() {
    if (!microphone) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            microphone = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            microphone.connect(analyser);
        } catch (err) {
            alert("마이크 권한이 필요합니다.");
            return;
        }
    }
    isListening = true;
    checkPitch();
}

function checkPitch() {
    if (!isListening) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    const pitch = autoCorrelate(buffer, audioCtx.sampleRate);

    if (pitch !== -1) {
        const noteIdx = getDiatonicIndex(pitch);
        if (noteIdx !== -1) {
            const noteName = KOR_NOTES[noteIdx];
            document.getElementById('user-note').innerText = `내 목소리: ${noteName}`;

            // 정답 확인
            if (noteIdx === targetSequence[userProgress]) {
                userProgress++;
                document.getElementById('status').innerText = `딩동댕! (${userProgress}/${currentLevel})`;
                
                if (userProgress >= currentLevel) {
                    isListening = false;
                    currentLevel++;
                    setTimeout(() => {
                        alert("통과! 다음 단계로 갑니다.");
                        startNewLevel();
                    }, 600);
                    return;
                }
            }
        }
    }
    requestAnimationFrame(checkPitch);
}

// 주파수를 다이아토닉 인덱스로 변환
function getDiatonicIndex(frequency) {
    // 12음계 기준으로 계산 후 다이아토닉에 해당하는지 확인
    const semiTone = 12 * (Math.log(frequency / 261.63) / Math.log(2));
    const totalNoteIdx = Math.round(semiTone);
    
    // C Major Scale 반음 간격: 0, 2, 4, 5, 7, 9, 11
    const diatonicMapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
    const modIdx = ((totalNoteIdx % 12) + 12) % 12;
    
    return diatonicMapping.hasOwnProperty(modIdx) ? diatonicMapping[modIdx] : -1;
}

// 기본적인 Pitch Detection (Auto-correlation)
function autoCorrelate(buffer, sampleRate) {
    let sum = 0;
    for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
    if (Math.sqrt(sum / buffer.length) < 0.03) return -1; // 노이즈 게이트

    let bestOffset = -1;
    let bestCorrelation = 0;
    for (let offset = 20; offset < 500; offset++) {
        let correlation = 0;
        for (let i = 0; i < buffer.length - offset; i++) {
            correlation += buffer[i] * buffer[i + offset];
        }
        if (correlation > bestCorrelation) {
            bestCorrelation = correlation;
            bestOffset = offset;
        }
    }
    return sampleRate / bestOffset;
}
</script>

</body>
</html>
