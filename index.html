<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모바일 기억력 테스트</title>
    <style>
        :root {
            --primary: #4a90e2;
            --danger: #ff4757;
            --success: #2ed573;
            --dark: #2f3542;
        }

        /* 기본 설정: 터치 방해 요소 제거 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .game-header { width: 100%; text-align: center; margin-bottom: 15px; }
        h1 { font-size: 1.5rem; margin: 10px 0; color: var(--dark); }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* 프로그레스 바: 모바일 폭에 맞춤 */
        .timer-container {
            width: 80%;
            max-width: 300px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 5px auto;
            overflow: hidden;
        }
        #progress {
            width: 100%; height: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        /* 📱 핵심: 모바일 그리드 설정 */
        .grid {
            display: grid;
            /* 기본적으로 4열 배치를 하여 스마트폰 세로 화면에 맞춤 */
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px;
            width: 100%;
            max-width: 400px; /* 아이폰 Pro Max 폭 정도 */
            padding: 5px;
        }

        /* 카드 크기: 가로폭에 맞춰 자동 조절 */
        .card {
            aspect-ratio: 3 / 4; /* 가로세로 비율 유지 */
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card-front { background: var(--dark); color: white; border: 1px solid #444; }
        .card-back {
            background: white;
            color: var(--dark);
            transform: rotateY(180deg);
            border: 2px solid var(--primary);
        }

        /* 성공/실패 효과 */
        .matched .card-back { background: var(--success) !important; color: white; border-color: var(--success); }
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-4px); }
            75% { transform: rotateY(180deg) translateX(4px); }
        }

        /* 결과 창 */
        #message-overlay {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            width: 80%;
            max-width: 300px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1000;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 15px;
        }

        /* 아이폰 홈 바 여유 공간 */
        footer { height: 40px; }
    </style>
</head>
<body>

    <div class="game-header">
        <h1>Memory Master</h1>
        <div class="stats">
            <div>목숨: <span id="lives" style="color: var(--danger)">3</span></div>
            <div id="status">준비!</div>
        </div>
        <div class="timer-container">
            <div id="progress"></div>
        </div>
    </div>

    <div id="game-board" class="grid"></div>

    <div id="message-overlay">
        <h2 id="msg-title">GAME OVER</h2>
        <p id="msg-desc">다시 도전하시겠습니까?</p>
        <button onclick="initGame()">게임 시작</button>
    </div>

    <footer></footer>

    <script>
        const symbols = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        let cards = [];
        let flippedCards = [];
        let lives = 3;
        let canClick = false;
        let matchedCount = 0;

        const board = document.getElementById('game-board');
        const livesDisplay = document.getElementById('lives');
        const statusDisplay = document.getElementById('status');
        const progressBar = document.getElementById('progress');
        const overlay = document.getElementById('message-overlay');

        function initGame() {
            board.innerHTML = '';
            overlay.style.display = 'none';
            lives = 3;
            matchedCount = 0;
            livesDisplay.innerText = lives;
            canClick = false;
            flippedCards = [];
            
            // 14장 생성 (7쌍)
            const deck = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
            
            deck.forEach(symbol => {
                const card = document.createElement('div');
                card.className = 'card flipped';
                card.innerHTML = `
                    <div class="card-face card-front">?</div>
                    <div class="card-face card-back">${symbol}</div>
                `;
                card.dataset.symbol = symbol;
                // 모바일 터치 대응
                card.addEventListener('click', () => handleCardClick(card));
                board.appendChild(card);
            });

            startCountdown();
        }

        function startCountdown() {
            let sec = 5;
            statusDisplay.innerText = `${sec}초 후 시작`;
            progressBar.style.transition = 'none';
            progressBar.style.width = '100%';
            
            setTimeout(() => {
                progressBar.style.transition = 'width 5s linear';
                progressBar.style.width = '0%';
            }, 10);

            const timer = setInterval(() => {
                sec--;
                statusDisplay.innerText = `${sec}초 후 시작`;
                if (sec <= 0) {
                    clearInterval(timer);
                    statusDisplay.innerText = "맞춰보세요!";
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
                    canClick = true;
                }
            }, 1000);
        }

        function handleCardClick(card) {
            if (!canClick || card.classList.contains('flipped') || flippedCards.length >= 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            
            if (c1.dataset.symbol === c2.dataset.symbol) {
                c1.classList.add('matched');
                c2.classList.add('matched');
                matchedCount += 2;
                flippedCards = [];
                if (matchedCount === 14) endGame(true);
            } else {
                canClick = false;
                setTimeout(() => {
                    c1.classList.add('shake');
                    c2.classList.add('shake');
                    
                    setTimeout(() => {
                        c1.classList.remove('flipped', 'shake');
                        c2.classList.remove('flipped', 'shake');
                        flippedCards = [];
                        lives--;
                        livesDisplay.innerText = lives;
                        canClick = true;
                        if (lives <= 0) endGame(false);
                    }, 500);
                }, 300);
            }
        }

        function endGame(isWin) {
            canClick = false;
            overlay.style.display = 'block';
            const title = document.getElementById('msg-title');
            title.innerText = isWin ? "성공! 🎉" : "실패! 👻";
            title.style.color = isWin ? "var(--success)" : "var(--danger)";
        }

        initGame();
    </script>
</body>
</html>
