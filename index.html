<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Memory Card</title>
    <style>
        :root {
            --bg-color: #3e2723; /* 다크 브라운 */
            --card-front: #5d4037;
            --card-back: #efebe9;
            --accent: #d4a373; /* 기타 나무 느낌의 골드 브라운 */
            --text-light: #d7ccc8;
            --success: #81c784;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            color: var(--text-light);
            min-height: 100vh;
        }

        .header-title { text-align: center; margin-top: 15px; }
        .header-title h1 { font-size: 0.9rem; color: var(--accent); margin: 0; letter-spacing: 1px; }
        .header-title h2 { font-size: 1.6rem; color: white; margin: 5px 0; font-weight: 800; }

        .status-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 12px 20px;
            border-radius: 15px;
            margin: 15px 0;
            border: 1px solid rgba(212, 163, 115, 0.3);
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; display: block; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: white; }

        .timer-bar {
            width: 100%; max-width: 340px; height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px; margin-bottom: 20px; overflow: hidden;
        }
        #progress { width: 100%; height: 100%; background: var(--accent); transition: width 1s linear; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 340px;
        }

        .card {
            aspect-ratio: 3 / 4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
        }

        .card-front { background: var(--card-front); color: var(--accent); border: 1px solid #4e342e; font-size: 1.2rem; }
        .card-back {
            background: var(--card-back);
            color: var(--bg-color);
            transform: rotateY(180deg);
        }

        .matched .card-back { background: var(--success); color: white; }

        #message-overlay {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff; color: #333;
            width: 85%; max-width: 300px;
            padding: 30px; border-radius: 20px;
            text-align: center; z-index: 1000;
        }

        button {
            width: 100%; padding: 15px;
            background: var(--accent); color: white;
            border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: bold; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header-title">
        <h1>SONG,YOUNG MIN Guitar Lab</h1>
        <h2>Memory Card</h2>
    </div>

    <div class="status-container">
        <div class="stat-item">
            <span class="stat-label">Misses</span>
            <span id="miss-count" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Pairs</span>
            <span id="pairs-count" class="stat-value">0/8</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Status</span>
            <span id="status" class="stat-value" style="font-size: 0.9rem;">Ready</span>
        </div>
    </div>

    <div class="timer-bar">
        <div id="progress"></div>
    </div>

    <div id="game-board" class="grid"></div>

    <div id="message-overlay">
        <h2 id="msg-title">GAME CLEAR!</h2>
        <p id="msg-desc">총 실수 횟수: <span id="final-miss">0</span>회</p>
        <button onclick="initGame()">다시 도전</button>
    </div>

    <script>
        // 사운드 데이터 (주파수 Hz)
        const notes = {
            'C': 261.63, 'D': 293.66, 'E': 329.63, 'F': 349.23,
            'G': 392.00, 'A': 440.00, 'B': 493.88, '🎼': 523.25 // 마지막은 높은 도
        };

        const symbols = Object.keys(notes);
        let flippedCards = [];
        let misses = 0;
        let matchedPairs = 0;
        let canClick = false;

        // 오디오 컨텍스트 설정
        let audioCtx = null;

        function playNote(symbol) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(notes[symbol], audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        const board = document.getElementById('game-board');
        const missDisplay = document.getElementById('miss-count');
        const pairsDisplay = document.getElementById('pairs-count');
        const statusDisplay = document.getElementById('status');
        const progressBar = document.getElementById('progress');
        const overlay = document.getElementById('message-overlay');

        function initGame() {
            board.innerHTML = '';
            overlay.style.display = 'none';
            misses = 0;
            matchedPairs = 0;
            missDisplay.innerText = misses;
            pairsDisplay.innerText = `0/8`;
            canClick = false;
            flippedCards = [];
            
            const deck = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
            
            deck.forEach(symbol => {
                const card = document.createElement('div');
                card.className = 'card flipped';
                card.innerHTML = `
                    <div class="card-face card-front">SYM</div>
                    <div class="card-face card-back">${symbol}</div>
                `;
                card.dataset.symbol = symbol;
                card.addEventListener('click', () => handleCardClick(card));
                board.appendChild(card);
            });

            startCountdown();
        }

        function startCountdown() {
            let sec = 5;
            statusDisplay.innerText = "Memorize";
            progressBar.style.transition = 'none';
            progressBar.style.width = '100%';
            
            setTimeout(() => {
                progressBar.style.transition = 'width 5s linear';
                progressBar.style.width = '0%';
            }, 10);

            const timer = setInterval(() => {
                sec--;
                if (sec <= 0) {
                    clearInterval(timer);
                    statusDisplay.innerText = "Play!";
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
                    canClick = true;
                }
            }, 1000);
        }

        function handleCardClick(card) {
            if (!canClick || card.classList.contains('flipped') || flippedCards.length >= 2) return;

            // 소리 재생
            playNote(card.dataset.symbol);

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            
            if (c1.dataset.symbol === c2.dataset.symbol) {
                c1.classList.add('matched');
                c2.classList.add('matched');
                matchedPairs++;
                pairsDisplay.innerText = `${matchedPairs}/8`;
                flippedCards = [];
                if (matchedPairs === 8) endGame();
            } else {
                canClick = false;
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                    misses++;
                    missDisplay.innerText = misses;
                    canClick = true;
                }, 800);
            }
        }

        function endGame() {
            canClick = false;
            setTimeout(() => {
                overlay.style.display = 'block';
                document.getElementById('final-miss').innerText = misses;
            }, 500);
        }

        initGame();
    </script>
</body>
</html>
