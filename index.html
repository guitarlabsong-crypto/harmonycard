<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Singing Test</title>
    <style>
        :root {
            --bg-color: #3e2723; /* 짙은 갈색 */
            --card-color: #5d4037; /* 중간 갈색 */
            --accent-color: #d7ccc8; /* 연한 베이지 */
            --point-color: #ffccbc; /* 살구색 포인트 */
        }
        body { 
            text-align: center; font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif; 
            background: var(--bg-color); color: #ffffff; margin: 0;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .container { 
            background: var(--card-color); width: 85%; max-width: 400px; 
            padding: 50px 20px; border-radius: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #795548;
        }
        .brand { font-size: 1rem; color: var(--accent-color); letter-spacing: 2px; margin-bottom: 5px; }
        .title { font-size: 2rem; font-weight: 800; margin-top: 0; margin-bottom: 40px; color: #fff; }
        
        #level-display { font-size: 1.2rem; color: var(--point-color); margin-bottom: 10px; font-weight: bold; }
        #note-display { 
            font-size: 4rem; font-weight: 900; margin: 30px 0; 
            color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.3); min-height: 80px; 
        }
        #user-feedback { font-size: 1.1rem; color: var(--accent-color); height: 25px; margin-bottom: 30px; }
        
        button { 
            background: #8d6e63; color: white; border: none; padding: 20px 50px; 
            border-radius: 50px; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button:active { transform: scale(0.95); background: #a1887f; }
        .status { margin-top: 20px; font-size: 1rem; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">SONG,YOUNG-MIN Guitar Lab</div>
    <div class="title">Singing Test</div>
    
    <div id="game-ui" style="display: none;">
        <div id="level-display">Level 1</div>
        <div id="note-display">-</div>
        <div id="user-feedback">내 음정: 대기 중</div>
        <div class="status" id="msg">버튼을 눌러 시작하세요.</div>
    </div>

    <button id="action-btn" onclick="handleButtonClick()">START GAME</button>
</div>

<script>
/* --- 데이터 설정 (다이아토닉 C4~B4) --- */
const NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];

let audioCtx, analyser, micStream;
let currentLevel = 1;
let targetSeq = [];
let userIdx = 0;
let isPlaying = false;
let isListening = false;

/* --- 메인 버튼 제어 --- */
function handleButtonClick() {
    if (!audioCtx) setupAudio();
    if (!isPlaying && !isListening) {
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('action-btn').style.display = 'none';
        startNewLevel();
    }
}

async function setupAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micStream = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    micStream.connect(analyser);
}

/* --- 게임 로직 --- */
function startNewLevel() {
    userIdx = 0;
    targetSeq = [];
    isListening = false;
    document.getElementById('level-display').innerText = `Level ${currentLevel}`;
    
    // 레벨만큼 랜덤 음 생성
    for(let i=0; i<currentLevel; i++) {
        targetSeq.push(Math.floor(Math.random() * NOTES.length));
    }
    
    playTarget();
}

async function playTarget() {
    isPlaying = true;
    document.getElementById('msg').innerText = "문제를 잘 듣고 기억하세요!";
    
    for (let i = 0; i < targetSeq.length; i++) {
        const noteIdx = targetSeq[i];
        document.getElementById('note-display').innerText = NOTES[noteIdx];
        await playTone(FREQS[noteIdx]);
        await new Promise(r => setTimeout(r, 300));
    }
    
    document.getElementById('note-display').innerText = "?";
    document.getElementById('msg').innerText = "방금 들은 음을 순서대로 부르세요!";
    isPlaying = false;
    isListening = true;
    detectPitch();
}

function playTone(freq) {
    return new Promise(resolve => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.8);
        setTimeout(resolve, 800);
    });
}

/* --- 음고 검출 알고리즘 (개선됨) --- */
function detectPitch() {
    if (!isListening) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    
    const pitch = getPitch(buffer, audioCtx.sampleRate);

    if (pitch !== -1) {
        // 주파수를 12음계 수치로 변환
        const midi = Math.round(12 * Math.log2(pitch / 261.63));
        // 다이아토닉 인덱스 매핑 (도=0, 레=2, 미=4, 파=5, 솔=7, 라=9, 시=11)
        const mapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
        const currentNote = ((midi % 12) + 12) % 12;

        if (mapping.hasOwnProperty(currentNote)) {
            const detectedIdx = mapping[currentNote];
            document.getElementById('user-feedback').innerText = `내 음정: ${NOTES[detectedIdx]}`;

            // 정답 판정
            if (detectedIdx === targetSeq[userIdx]) {
                userIdx++;
                if (userIdx >= targetSeq.length) {
                    isListening = false;
                    document.getElementById('msg').innerText = "훌륭합니다!";
                    setTimeout(() => {
                        currentLevel++;
                        startNewLevel();
                    }, 1000);
                    return;
                } else {
                    document.getElementById('msg').innerText = `다음 음... (${userIdx}/${currentLevel})`;
                }
            }
        }
    }
    requestAnimationFrame(detectPitch);
}

// 주파수 추출 알고리즘 (AMDF 방식)
function getPitch(buffer, sampleRate) {
    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    if (Math.sqrt(rms / buffer.length) < 0.02) return -1; // 작은 소리 무시

    let bestScroll = -1;
    let minDifference = Infinity;

    // 인간의 가창 범위 (약 80Hz ~ 1000Hz) 탐색
    for (let scroll = 40; scroll < 500; scroll++) {
        let difference = 0;
        for (let i = 0; i < buffer.length - scroll; i++) {
            difference += Math.abs(buffer[i] - buffer[i + scroll]);
        }
        if (difference < minDifference) {
            minDifference = difference;
            bestScroll = scroll;
        }
    }
    return sampleRate / bestScroll;
}
</script>

</body>
</html>
